applications:
  - name: procurement-graphrag
    memory: 1024M
    disk_quota: 1G
    buildpacks:
      - python_buildpack
    command: python -m graphrag.api --host 0.0.0.0 --port $PORT
    env:
      GRAPH_BACKEND: hana
      HANA_SCHEMA: PROCUREMENT
      HANA_PORT: "443"
      HANA_USER: DBADMIN
      AICORE_RESOURCE_GROUP: default
